<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#151512" />
<title>Abrindo WhatsApp | Detetive Kapi</title>
<link rel="canonical" href="https://kapivara.co/qr.html" />
<link rel="icon" href="assets/favicon.ico" sizes="any" />
<style>
  body{
    min-height:100vh;
    margin:0;
    display:grid;
    place-items:center;
    padding:24px;
    background:#151512;
    color:#f7f0df;
    font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-align:center;
  }
  main{
    max-width:420px;
  }
  img{
    width:min(180px, 58vw);
    height:auto;
    margin-bottom:20px;
  }
  h1{
    margin:0 0 10px;
    font-size:28px;
    line-height:1.05;
  }
  p{
    margin:0 0 20px;
    color:#d9cfba;
    line-height:1.45;
  }
  a{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:48px;
    padding:0 20px;
    border:4px solid #050504;
    border-radius:14px;
    background:#58c263;
    color:#050504;
    box-shadow:5px 6px 0 rgba(0,0,0,.62);
    font-weight:900;
    text-transform:uppercase;
    text-decoration:none;
  }
</style>
</head>
<body>
<main>
  <img src="assets/kapi-logo-B.png" width="1077" height="670" alt="Detetive Kapi" />
  <h1>Abrindo a investigação...</h1>
  <p>Se o WhatsApp não abrir automaticamente, toque no botão abaixo.</p>
  <a id="manual-link" href="https://wa.me/5511989419928?text=Oi%2C%20Detetive%20Kapi.%20Quero%20entrar%20na%20investiga%C3%A7%C3%A3o.">Entrar na investigação</a>
</main>
<script>
  const WHATSAPP_URL = 'https://wa.me/5511989419928?text=Oi%2C%20Detetive%20Kapi.%20Quero%20entrar%20na%20investiga%C3%A7%C3%A3o.';
  const source = new URLSearchParams(window.location.search).get('src') || 'qr';
  const eventPayload = JSON.stringify({
    event: 'qr_code_open',
    source,
    path: window.location.pathname,
    timestamp: new Date().toISOString()
  });

  try {
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event:'qr_code_open', qr_source:source });
    if (typeof navigator.sendBeacon === 'function') {
      navigator.sendBeacon('/api/qr-open', new Blob([eventPayload], { type:'application/json' }));
    } else {
      fetch('/api/qr-open', { method:'POST', body:eventPayload, headers:{ 'content-type':'application/json' }, keepalive:true }).catch(() => {});
    }
  } catch (error) {}

  document.getElementById('manual-link').href = WHATSAPP_URL;
  window.setTimeout(() => {
    window.location.replace(WHATSAPP_URL);
  }, 650);
</script>
</body>
</html>
