services:
  - type: web
    name: kapivara-landing
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    domains:
      - kapivara.co
    envVars:
      - key: NODE_ENV
        value: production
      - key: STATS_CHECKPOINT_INTERVAL_MS
        value: "10800000"
      - key: DATABASE_URL
        fromDatabase:
          name: kapivara-stats-db
          property: connectionString

databases:
  - name: kapivara-stats-db
    databaseName: kapivara_stats
    user: kapivara_stats_user
    plan: free
